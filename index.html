<style>

<body>

<div class="card" id="loginBox">
<h2>REPORTE ALERTA DE CALIDAD</h2>

<label>Nombre</label>

<div style="position:relative;">
 <input id="nombre" placeholder="Escribe el nombre" oninput="filtrarNombres()">

<div class="card hidden" id="systemBox">
<h2>
REPORTE ALERTA DE CALIDAD<br>
<span id="bienvenida" style="font-size:14px;color:#333;"></span>
</h2>

<div id="folioBox" class="folio">Folio: ---</div>

<div class="section">

<select id="tipo" onchange="cambiarTipo()">

<input id="unidadEnvio">
<label>Identificador</label>
<input id="idTransporte">
</div>

<label>Hallazgo</label>

 <input id="hallazgo" placeholder="Escribe el hallazgo" oninput="filtrarHallazgos()">
 <div id="listaHallazgosCustom" class="lista-autocomplete"></div>
</div>

<input id="ubicacion" placeholder="Ingresa la ubicación">

<div class="section">
<label>Evidencia fotográfica</label>

<input type="file" id="foto" accept="image/*" multiple>

<canvas id="firma" style="cursor:pointer;"></canvas>

<p id="msg"></p>
</div>

<div id="firmaModal" class="hidden" style="
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.8);
 justify-content:center;
 align-items:center;
 z-index:999;
">

 <div style="background:white;padding:20px;border-radius:10px;width:90%;max-width:400px;">
  
  <h3 style="text-align:center;">Firma</h3>

  <canvas id="firmaGrande" style="width:100%;height:200px;border:1px solid black;"></canvas>

  <div style="display:flex;gap:10px;margin-top:10px;">
   <button class="btn-app btn-verde" onclick="guardarFirma()">Aceptar</button>
   <button class="btn-app btn-gris" onclick="limpiarFirmaGrande()">Limpiar</button>
   <button class="btn-app btn-rojo" onclick="cerrarFirma()">Salir</button>
</div>
  </div>

 </div>
</div>

<script>

// SUPABASE
const supabaseClient = supabase.createClient(
 "https://wpitemofrqzjcsetmmim.supabase.co",
 "sb_publishable_lHlAJ8Q2lThBAd9oDy69cw_QkSTlJLu"
);

const SESSION_TIME = 30 * 60 * 1000; // 30 minutos

// FECHA
function fechaFormato(){
 const m=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
 let d=new Date();
 return `${String(d.getDate()).padStart(2,'0')}-${m[d.getMonth()]}-${String(d.getFullYear()).slice(-2)}`;
}
fechaLogin.value=fechaFormato();

function cerrarFirma(){
 document.getElementById("firmaModal").classList.add("hidden");

}

// PERSONAL
const personal = {

 "Angel Moreno": {cuadrilla:"A", area:"Embarque", pass:"1234"},
 "Antonio Badillo": {cuadrilla:"A", area:"Recibo", pass:"1234"},

 "Areli Rosas": {cuadrilla:"B", area:"Embarque", pass:"1234"},
 "Ivan Coxanteje": {cuadrilla:"B", area:"Recibo", pass:"1234"},

 "Gregorio Pérez": {cuadrilla:"C", area:"Recibo", pass:"1234"},
 "Jesús Gonzalez": {cuadrilla:"C", area:"Embarque", pass:"1234"},

 "Gabriela Alvarado": {cuadrilla:"D", area:"Recibo", pass:"1234"},
 "Carlos Cruz": {cuadrilla:"D", area:"Embarque", pass:"1234"},

 "Felix Montoya": {
  cuadrilla: "ADMIN",
  area: "QA",
  pass: "1710",
  admin: true
 }

};

const listaHallazgosDatos = [
 "CAJAS ABIERTAS",
 "CAJAS DAÑADAS",
 "CAVERNA",
 "CODIGO ERRONEO",
 "COLAPSO",
 "CORTINA DAÑADA",
 "DERRAME DE PRODUCTO",
 "DESVIACIÓN",
 "DIMENSIÓN INADECUADA",
 "ENVOLTURAS (DULCES)",
 "ETIQUETA DAÑADA",
 "ETIQUETA DESPRENDIDA",
 "ETIQUETA SIN INFORMACIÓN",
 "FALTANTE",
 "GOTERA",
 "MAL EMPLAYADO",
 "MEZCLA DE CÓDIGOS",
 "MEZCLA DE LOTES",
 "MURO",
 "ORDEN Y LIMPIEZA",
 "ORIENTACIÓN INCORRECTA",
 "PALLET CON POLVO",
 "PALLET CON RESTO",
 "PALLET LADEADO",
 "PALLET SIN ETIQUETA",
 "PALLET SOBRE PASILLO",
 "PALLET VACÍO EN UBICACIÓN",
 "PIRAMIDE DE FRAGILIDAD",
 "PLAGA",
 "PRODUCTO \"SUELTO\"",
 "PRODUCTO MOJADO",
 "RACK DAÑADO",
 "REGLETA DAÑADA",
 "REGLETA NO LEGIBLE",
 "SECTORIZACIÓN INCORRECTA",
 "SOBRANTE",
 "SUSTRACCION",
 "TARIMA DAÑADA"
];

function autocompletar(){
 let p=personal[nombre.value];
 cuadrilla.value=p?.cuadrilla || "";
 areaLogin.value=p?.area || "";
}


let datosGenerales={},folioGlobal="";

// FOLIO
async function generarFolio(){
 const { data } = await supabaseClient
 .from("Reportes")
 .select("folio")
 .order("folio",{ascending:false})
 .limit(1);

 let ultimo=data?.[0]?.folio || "AC-2627-000";
 let num=parseInt(ultimo.split("-")[2])+1;
 return "AC-2627-"+String(num).padStart(3,'0');
}

// LOGIN
async function login(){

 if(!nombre.value){
  alert("Selecciona nombre");
  return;
 }

 if(!password.value){
  alert("Ingresa la contraseña");
  return;
 }

let nombreLimpio = nombre.value.trim();
let user = personal[nombreLimpio];

if(!user){
 alert("Usuario inválido");
 return;
}

let esAdmin = user.admin === true;


 if(password.value.trim() !== user.pass){
  alert("Contraseña incorrecta");
  return;
 }

 // ✅ si pasa todo
datosGenerales={
  nombre:nombreLimpio,
  cuadrilla:user.cuadrilla,
  area:user.area,
  turno:turno.value,
  fecha:fechaLogin.value
 };

 cuadrilla.value = user.cuadrilla;
 areaLogin.value = user.area;

 folioGlobal=await generarFolio();
 folioBox.innerText="Folio: "+folioGlobal;

 bienvenida.innerText = "BIENVENIDO: " + datosGenerales.nombre.toUpperCase();

 loginBox.classList.add("hidden");
 systemBox.classList.remove("hidden");
 // ✅ guardar sesión con expiración (30 min)
let sessionData = {
  datos: datosGenerales,
  inicio: Date.now()
};

localStorage.setItem("sesionActiva", JSON.stringify(sessionData));
 if(esAdmin){
 adminBtn.classList.remove("hidden");
}
}

// TIPO
function cambiarTipo(){
 productoSec.classList.add("hidden");
 transporteSec.classList.add("hidden");

 if(tipo.value==="Producto") productoSec.classList.remove("hidden");
 if(tipo.value==="Transporte") transporteSec.classList.remove("hidden");
}

// FIRMA
let canvas=document.getElementById("firma");
let ctx=canvas.getContext("2d");
canvas.addEventListener("click", abrirFirma);
canvas.addEventListener("touchstart", abrirFirma);

// ===== FIRMA GRANDE (MODAL) =====
let canvasGrande;
let ctxGrande;


function abrirFirma(e){
  if(e){
 e.preventDefault();
}
 document.getElementById("firmaModal").classList.remove("hidden");

 setTimeout(()=>{

  canvasGrande = document.getElementById("firmaGrande");
  ctxGrande = canvasGrande.getContext("2d");

  canvasGrande.width = canvasGrande.offsetWidth;
  canvasGrande.height = 200;

  ctxGrande.strokeStyle = "black";
  ctxGrande.lineWidth = 2;

  let d2 = false;

  // mouse
  canvasGrande.onmousedown = () => d2 = true;

  canvasGrande.onmouseup = () => {
   d2 = false;
   ctxGrande.beginPath();
  };

  canvasGrande.onmousemove = e=>{
   if(!d2) return;
   ctxGrande.lineTo(e.offsetX, e.offsetY);
   ctxGrande.stroke();
  };

  // touch
  canvasGrande.ontouchstart = e=>{
   e.preventDefault();
   d2 = true;

   const rect = canvasGrande.getBoundingClientRect();
   const touch = e.touches[0];

   ctxGrande.beginPath();
   ctxGrande.moveTo(
    touch.clientX - rect.left,
    touch.clientY - rect.top
   );
  };

  canvasGrande.ontouchend = ()=>{
   d2 = false;
   ctxGrande.beginPath();
  };

  canvasGrande.ontouchmove = e=>{
   if(!d2) return;
   e.preventDefault();

   const rect = canvasGrande.getBoundingClientRect();
   const touch = e.touches[0];

   ctxGrande.lineTo(
    touch.clientX - rect.left,
    touch.clientY - rect.top
   );

   ctxGrande.stroke();
  };

 },100);
}

function limpiarFirmaGrande(){
 ctxGrande.clearRect(0,0,canvasGrande.width,canvasGrande.height);
}

function guardarFirma(){

 ajustarCanvas(); // ✅ FUERZA tamaño correcto

 ctx.clearRect(0,0,canvas.width,canvas.height);
 ctx.drawImage(canvasGrande,0,0,canvas.width,canvas.height);

 document.getElementById("firmaModal").classList.add("hidden");
}
// ===== DIBUJO FIRMA GRANDE =====


ctx.strokeStyle = "black";
ctx.lineWidth = 2;

function ajustarCanvas(){
 canvas.width = canvas.offsetWidth;
 canvas.height = 150;
}

// esperar a que cargue bien
window.addEventListener("load", ajustarCanvas);

let d = false;

// MOUSE (PC)
canvas.addEventListener("mousedown", ()=> d = true);
canvas.addEventListener("mouseup", ()=> { d = false; ctx.beginPath(); });
canvas.addEventListener("mousemove", e=>{
 if(!d) return;
 ctx.lineTo(e.offsetX, e.offsetY);
 ctx.stroke();
});

// TOUCH (CELULAR)
canvas.addEventListener("touchstart", e=>{
 e.preventDefault();

 d = true;
 const rect = canvas.getBoundingClientRect();
 const touch = e.touches[0];

 ctx.beginPath();
 ctx.strokeStyle = "black";
ctx.lineWidth = 2;

 ctx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top);
});

canvas.addEventListener("touchend", ()=>{
 d = false;
 ctx.beginPath();
});

canvas.addEventListener("touchmove", e=>{
 if(!d) return;
 e.preventDefault();

 const rect = canvas.getBoundingClientRect();
 const touch = e.touches[0];

 ctx.lineTo(
  touch.clientX - rect.left,
  touch.clientY - rect.top
 );
 ctx.stroke();
});

function limpiarFirma(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
}

function accionAdmin(){
 alert("Bienvenido al panel de administrador");
}

function canvasVacio(c){
  const context = c.getContext("2d");
  const pixelBuffer = new Uint32Array(
    context.getImageData(0, 0, c.width, c.height).data.buffer
  );
  return !pixelBuffer.some(color => color !== 0);
}
// GUARDAR
async function guardar(){

 if(
  !folioGlobal ||
  !datosGenerales ||
  !datosGenerales.nombre ||
  !datosGenerales.turno ||
  !datosGenerales.cuadrilla ||
  !datosGenerales.area ||
  !tipo.value ||
  !hallazgo.value ||
  !ubicacion.value ||

  !listaHallazgosDatos.includes(hallazgo.value.toUpperCase()) ||

  (tipo.value === "Producto" && (
    !codigo.value ||
    !lote.value ||
    !cantidad.value ||
    !unidad.value
  )) ||

  (tipo.value === "Transporte" && (
    !unidadEnvio.value ||
    !idTransporte.value
  )) ||

  canvasVacio(canvas)
 ){
  alert("Debes completar todos los campos y firmar antes de guardar");
  return;
 }

 try {

  const { error } = await supabaseClient
   .from("Reportes")
   .insert([{
    folio: folioGlobal,
    fecha: datosGenerales.fecha,
    nombre: datosGenerales.nombre,
    turno: datosGenerales.turno,
    cuadrilla: datosGenerales.cuadrilla,
    area: datosGenerales.area,
    tipo: tipo.value,
    hallazgo: hallazgo.value,
    ubicacion: ubicacion.value,

    codigo: codigo.value || null,
    lote: lote.value || null,
    cantidad: cantidad.value || null,
    unidad: unidad.value || null,

    unidad_envio: unidadEnvio.value || null,
    id_transporte: idTransporte.value || null,

    firma: canvas.toDataURL()
   }]);

  if(error){
    console.error(error);
    alert("Error al guardar en Supabase");
    return;
  }

  msg.innerText = "✅ Guardado en Supabase: " + folioGlobal;

 } catch(e){
  console.error(e);
  alert("Error inesperado");
 }

}


function logout(){
 localStorage.clear();
 location.reload();

}

document.addEventListener("click", function(e){

 if(!e.target.closest("#nombre") && !e.target.closest("#listaResultados")){
  let lista = document.getElementById("listaResultados");

  if(lista){
   lista.innerHTML = "";
  }
 }

});
function filtrarNombres(){

 let input = document.getElementById("nombre").value.toLowerCase();
 let lista = document.getElementById("listaResultados");

 lista.innerHTML = "";

 if(!input){
 lista.innerHTML = "";
 return;
}

 let nombres = Object.keys(personal);

 let filtrados = nombres.filter(nombre =>
  nombre.toLowerCase().includes(input)
 );

 filtrados.forEach(nombre =>{

  let div = document.createElement("div");
  div.innerText = nombre;
  div.className = "item-autocomplete";

  div.onclick = function(){
   document.getElementById("nombre").value = nombre;
   lista.innerHTML = "";
   autocompletar();
  };

  lista.appendChild(div);

 });

}
function filtrarHallazgos(){

 let input = document.getElementById("hallazgo").value.toUpperCase();
 let lista = document.getElementById("listaHallazgosCustom");

 lista.innerHTML = "";

 if(!input){
  hallazgo.style.border = "1px solid #bbb";
  return;
 }

 let filtrados = listaHallazgosDatos.filter(function(h){
  return h.includes(input);
 });

 filtrados.forEach(function(h){

  let div = document.createElement("div");
  div.innerText = h;
  div.className = "item-autocomplete";

  div.onclick = function(){
   document.getElementById("hallazgo").value = h;
   lista.innerHTML = "";
   hallazgo.style.border = "2px solid green";
  };

  lista.appendChild(div);

 });

 // VALIDACIÓN VISUAL
 if(!listaHallazgosDatos.includes(input)){
  hallazgo.style.border = "2px solid red";
 } else {
  hallazgo.style.border = "2px solid green";
 }

}

function renovarSesion(){

 let sesionGuardada = localStorage.getItem("sesionActiva");
 if(!sesionGuardada) return;

 let sesion = JSON.parse(sesionGuardada);
 sesion.inicio = Date.now();

 localStorage.setItem("sesionActiva", JSON.stringify(sesion));
}

document.addEventListener("click", renovarSesion);
document.addEventListener("keydown", renovarSesion);
document.addEventListener("touchstart", renovarSesion);

function verificarSesion(){

 const sesionGuardada = localStorage.getItem("sesionActiva");
 if(!sesionGuardada) return;

 let sesion = JSON.parse(sesionGuardada);

 let ahora = Date.now();

 if(ahora - sesion.inicio > SESSION_TIME){
  localStorage.removeItem("sesionActiva");
  return;
 }

 // recuperar datos
 datosGenerales = sesion.datos;

 // renovar sesión
 sesion.inicio = Date.now();
 localStorage.setItem("sesionActiva", JSON.stringify(sesion));

 // restaurar pantalla
 bienvenida.innerText = "BIENVENIDO: " + datosGenerales.nombre.toUpperCase();
 cuadrilla.value = datosGenerales.cuadrilla;
 areaLogin.value = datosGenerales.area;

 loginBox.classList.add("hidden");
 systemBox.classList.remove("hidden");

 // cargar folio (solo una vez)
 generarFolio().then(folio=>{
  folioGlobal = folio;
  folioBox.innerText = "Folio: " + folioGlobal;
 });

 // admin
 let user = personal[datosGenerales.nombre];
 if(user?.admin){
  adminBtn.classList.remove("hidden");
 }

}

window.addEventListener("load", verificarSesion);

</script>
</body>
</html>
