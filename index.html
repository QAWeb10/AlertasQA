function cargarUsuarios(){

);

"adminPortal",

// =========================
// SUPABASE
// =========================

const supabaseClient = supabase.createClient(
"https://wpitemofrqzjcsetmmim.supabase.co",
"sb_publishable_lHlAJ8Q2lThBAd9oDy69cw_QkSTlJLu"
);

// =========================
// ALERTAS
// =========================

async function descargarExcelAlertas(){

 let todos = [];
 let desde = 0;
 let hasta = 999;

 while(true){

   const { data, error } =
   await supabaseClient
   .from("Reportes")
   .select("*")
   .range(desde,hasta);

   if(error){
      console.error(error);
      return;
   }

   todos = todos.concat(data);

   if(data.length < 1000){
      break;
   }

   desde += 1000;
   hasta += 1000;
 }

 console.log("Total:",todos.length);

 let csv =
 "Folio,Fecha,Nombre,Turno,Cuadrilla,Area,Tipo,Hallazgo\n";

 todos.forEach(r=>{

   csv +=
`${limpiar(r.folio)},${limpiar(r.fecha)},${limpiar(r.nombre)},${limpiar(r.turno)},${limpiar(r.cuadrilla)},${limpiar(r.area)},${limpiar(r.tipo)},${limpiar(r.hallazgo)}\n`;
 });

 descargarCSV(csv,"Alertas_Completo.csv");
}

// =========================
// AUDITORIAS
// =========================

async function descargarExcelAuditorias(){

 const { data,error } =
 await supabaseClient
 .from("Auditoria_Recibo")
 .select("*");

 if(error){
   alert("Error cargando auditorías");
   return;
 }

 let csv =
 "Folio,Nombre,Area,Turno,Cortina,STO,Origen,Etiqueta,Desviacion\n";

 data.forEach(r=>{

   csv +=
`${limpiar(r.folio)},${limpiar(r.nombre)},${limpiar(r.area)},${limpiar(r.turno)},${limpiar(r.cortina)},${limpiar(r.sto)},${limpiar(r.origen)},${limpiar(r.etiqueta)},${limpiar(r.desviacion)}\n`;
 });

 descargarCSV(csv,"Auditorias_Completo.csv");

}

// =========================
// INCIDENCIAS
// =========================

async function descargarExcelIncidencias(){

 const { data,error } =
 await supabaseClient
 .from("incidencias_recibo")
 .select("*");

 if(error){
   alert("Error cargando incidencias");
   return;
 }

 let csv =
 "Folio,Nombre,Cortina,STO,Origen,Motivo\n";

 data.forEach(r=>{

   const motivo =
   r.desviaciones?.[0]?.motivo || "";

   csv +=
`${limpiar(r.folio)},${limpiar(r.nombre)},${limpiar(r.cortina)},${limpiar(r.sto)},${limpiar(r.origen)},${limpiar(motivo)}\n`;

 });

 descargarCSV(csv,"Incidencias_Completo.csv");

}

function limpiar(valor){

 return `"${String(valor ?? "")
   .replace(/"/g,'""')
   .replace(/\n/g,' ')
   .replace(/\r/g,' ')}"`;

}

// =========================

function descargarCSV(csv,nombre){

 const blob = new Blob(
  ["\uFEFF" + csv],
  {
   type:"text/csv;charset=utf-8;"
  }
 );

 const url =
 URL.createObjectURL(blob);

 const enlace =
 document.createElement("a");

 enlace.href = url;
 enlace.download = nombre;

 document.body.appendChild(enlace);

 enlace.click();

 document.body.removeChild(enlace);

 URL.revokeObjectURL(url);

}
