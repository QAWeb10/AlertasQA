const SESSION_TIME = 30 * 60 * 1000; // 30 minutos

// FECHA
function fechaFormato(){
 const m=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];

 "CAJAS ABIERTAS",

function autocompletar(){
 let p=personal[nombre.value];
 cuadrilla.value=p?.cuadrilla || "";
 areaLogin.value=p?.area || "";
}


let datosGenerales={},folioGlobal="";

// FOLIO
async function generarFolio(){

 const { data } = await supabaseClient
  .from("Reportes")
  .select("folio");

 // ✅ SI NO HAY REGISTROS → EMPEZAR EN 001
 if(!data || data.length === 0){
  return "AC-2627-001";
 }

 // ✅ obtener último número
 let numeros = data.map(r => parseInt(r.folio.split("-")[2]));
 let max = Math.max(...numeros);

 let nuevo = max + 1;

 return "AC-2627-" + String(nuevo).padStart(3,'0');

}

// LOGIN
async function login(){

 if(!nombre.value){
  alert("Selecciona nombre");
  return;
 }

 if(!password.value){
  alert("Ingresa la contraseña");
  return;
 }

let nombreLimpio = nombre.value.trim();
let user = personal[nombreLimpio];

if(!user){
 alert("Usuario inválido");
 return;
}

let esAdmin = user.admin === true;


 if(password.value.trim() !== user.pass){
  alert("Contraseña incorrecta");
  return;
 }

 // ✅ si pasa todo
datosGenerales={
  nombre:nombreLimpio,
  cuadrilla:user.cuadrilla,
  area:user.area,
  turno:turno.value,
  fecha:fechaLogin.value
 };

 cuadrilla.value = user.cuadrilla;
 areaLogin.value = user.area;

 folioGlobal=await generarFolio();
 folioBox.innerText="Folio: "+folioGlobal;

 bienvenida.innerText = "BIENVENIDO: " + datosGenerales.nombre.toUpperCase();

 loginBox.classList.add("hidden");
 systemBox.classList.remove("hidden");
 // ✅ guardar sesión con expiración (30 min)
let sessionData = {
  datos: datosGenerales,
  inicio: Date.now()
};

localStorage.setItem("sesionActiva", JSON.stringify(sessionData));
 if(esAdmin){
 adminBtn.classList.remove("hidden");
}
}

// TIPO
function cambiarTipo(){
 productoSec.classList.add("hidden");
 transporteSec.classList.add("hidden");

 if(tipo.value==="Producto") productoSec.classList.remove("hidden");
 if(tipo.value==="Transporte") transporteSec.classList.remove("hidden");
}

// FIRMA
let canvas=document.getElementById("firma");
let ctx=canvas.getContext("2d");
canvas.addEventListener("click", abrirFirma);
canvas.addEventListener("touchstart", abrirFirma);

// ===== FIRMA GRANDE (MODAL) =====
let canvasGrande;
let ctxGrande;


function abrirFirma(e){
  if(e){
 e.preventDefault();
}
 document.getElementById("firmaModal").classList.remove("hidden");

 setTimeout(()=>{

  canvasGrande = document.getElementById("firmaGrande");
  ctxGrande = canvasGrande.getContext("2d");

  canvasGrande.width = canvasGrande.offsetWidth;
  canvasGrande.height = 200;

  ctxGrande.strokeStyle = "black";
  ctxGrande.lineWidth = 2;

  let d2 = false;

  // mouse
  canvasGrande.onmousedown = () => d2 = true;

  canvasGrande.onmouseup = () => {
   d2 = false;
   ctxGrande.beginPath();
  };

  canvasGrande.onmousemove = e=>{
   if(!d2) return;
   ctxGrande.lineTo(e.offsetX, e.offsetY);
   ctxGrande.stroke();
  };

  // touch
  canvasGrande.ontouchstart = e=>{
   e.preventDefault();
   d2 = true;

   const rect = canvasGrande.getBoundingClientRect();
   const touch = e.touches[0];

   ctxGrande.beginPath();
   ctxGrande.moveTo(
    touch.clientX - rect.left,
    touch.clientY - rect.top
   );
  };

  canvasGrande.ontouchend = ()=>{
   d2 = false;
   ctxGrande.beginPath();
  };

  canvasGrande.ontouchmove = e=>{
   if(!d2) return;
   e.preventDefault();

   const rect = canvasGrande.getBoundingClientRect();
   const touch = e.touches[0];

   ctxGrande.lineTo(
    touch.clientX - rect.left,
    touch.clientY - rect.top
   );

   ctxGrande.stroke();
  };

 },100);
}

function limpiarFirmaGrande(){
 ctxGrande.clearRect(0,0,canvasGrande.width,canvasGrande.height);
}

function guardarFirma(){

 ajustarCanvas(); // ✅ FUERZA tamaño correcto

 ctx.clearRect(0,0,canvas.width,canvas.height);
 ctx.drawImage(canvasGrande,0,0,canvas.width,canvas.height);

 document.getElementById("firmaModal").classList.add("hidden");
}
// ===== DIBUJO FIRMA GRANDE =====


ctx.strokeStyle = "black";
ctx.lineWidth = 2;

function ajustarCanvas(){
 canvas.width = canvas.offsetWidth;
 canvas.height = 150;
}

// esperar a que cargue bien
window.addEventListener("load", ajustarCanvas);

let d = false;

// MOUSE (PC)
canvas.addEventListener("mousedown", ()=> d = true);
canvas.addEventListener("mouseup", ()=> { d = false; ctx.beginPath(); });
canvas.addEventListener("mousemove", e=>{
 if(!d) return;
 ctx.lineTo(e.offsetX, e.offsetY);
 ctx.stroke();
});

// TOUCH (CELULAR)
canvas.addEventListener("touchstart", e=>{
 e.preventDefault();

 d = true;
 const rect = canvas.getBoundingClientRect();
 const touch = e.touches[0];

 ctx.beginPath();
 ctx.strokeStyle = "black";
ctx.lineWidth = 2;

 ctx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top);
});

canvas.addEventListener("touchend", ()=>{
 d = false;
 ctx.beginPath();
});

canvas.addEventListener("touchmove", e=>{
 if(!d) return;
 e.preventDefault();

 const rect = canvas.getBoundingClientRect();
 const touch = e.touches[0];

 ctx.lineTo(
  touch.clientX - rect.left,
  touch.clientY - rect.top
 );
 ctx.stroke();
});

function limpiarFirma(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
}

function accionAdmin(){

 let adminBox = document.getElementById("adminBox");

 adminBox.style.display = "flex";

 cargarAdmin();
}

function canvasVacio(c){
  const context = c.getContext("2d");
  const pixelBuffer = new Uint32Array(
    context.getImageData(0, 0, c.width, c.height).data.buffer
  );
  return !pixelBuffer.some(color => color !== 0);
}
// GUARDAR
async function guardar(){

  if(!formularioCompleto()){
 alert("Debes completar todos los campos antes de guardar");
 return;
}

 if(
  !folioGlobal ||
  !datosGenerales ||
  !datosGenerales.nombre ||
  !datosGenerales.turno ||
  !datosGenerales.cuadrilla ||
  !datosGenerales.area ||
  !tipo.value ||
  !hallazgo.value ||
  !ubicacion.value ||

  !listaHallazgosDatos.includes(hallazgo.value.toUpperCase()) ||

  (tipo.value === "Producto" && (
    !codigo.value ||
    !lote.value ||
    !cantidad.value ||
    !unidad.value
  )) ||

  (tipo.value === "Transporte" && (
    !unidadEnvio.value ||
    !idTransporte.value
  )) ||


  
  canvasVacio(canvas)
  
 ){
  alert("Debes completar todos los campos y firmar antes de guardar");
  return;
 }

 try {

  // SUBIR IMÁGENES
let urlsImagenes = [];

if(foto.files.length > 0){

 for(let i = 0; i < foto.files.length; i++){

  let archivo = foto.files[i];

  let nombreArchivo = `${folioGlobal}_${Date.now()}_${i}.jpg`;

  let { error: errorUpload } = await supabaseClient
 .storage
 .from("evidencias")
 .upload(nombreArchivo, archivo);


  if(errorUpload){
  console.error("Error subiendo imagen:", errorUpload);
  continue;
}

  let { data: urlData } = supabaseClient
   .storage
   .from("evidencias")
   .getPublicUrl(nombreArchivo);

  urlsImagenes.push(urlData.publicUrl);
 }

}

  const { error } = await supabaseClient
   .from("Reportes")
   .insert([{
    folio: folioGlobal,
    fecha: datosGenerales.fecha,
    nombre: datosGenerales.nombre,
    turno: datosGenerales.turno,
    cuadrilla: datosGenerales.cuadrilla,
    area: datosGenerales.area,
    tipo: tipo.value,
    hallazgo: hallazgo.value,
    ubicacion: ubicacion.value,

    codigo: codigo.value || null,
    lote: lote.value || null,
    cantidad: cantidad.value || null,
    unidad: unidad.value || null,

    unidad_envio: unidadEnvio.value || null,
    id_transporte: idTransporte.value || null,

   firma: canvas.toDataURL(),
imagenes: urlsImagenes
   }]);

  if(error){
    console.error(error);
    alert("Error al guardar en Supabase");
    return;
  }

  msg.innerText = "✅ Guardado en Supabase: " + folioGlobal;

 } catch(e){
  console.error(e);
  alert("Error inesperado");
 }

}

function formularioCompleto(){

 return !(
  !folioGlobal ||
  !datosGenerales ||
  !datosGenerales.nombre ||
  !datosGenerales.turno ||
  !datosGenerales.cuadrilla ||
  !datosGenerales.area ||
  !tipo.value ||
  !hallazgo.value ||
  !ubicacion.value ||

  !listaHallazgosDatos.includes(hallazgo.value.toUpperCase()) ||

  (tipo.value === "Producto" && (
    !codigo.value ||
    !lote.value ||
    !cantidad.value ||
    !unidad.value
  )) ||

  (tipo.value === "Transporte" && (
    !unidadEnvio.value ||
    !idTransporte.value
  )) ||

  canvasVacio(canvas)
 );
}
function logout(){
 localStorage.clear();
 location.reload();

}

document.addEventListener("click", function(e){

 if(!e.target.closest("#nombre") && !e.target.closest("#listaResultados")){
  let lista = document.getElementById("listaResultados");

  if(lista){
   lista.innerHTML = "";
  }
 }

});
function filtrarNombres(){

 let input = document.getElementById("nombre").value.toLowerCase();
 let lista = document.getElementById("listaResultados");

 lista.innerHTML = "";

 if(!input){
 lista.innerHTML = "";
 return;
}

 let nombres = Object.keys(personal);

 let filtrados = nombres.filter(nombre =>
  nombre.toLowerCase().includes(input)
 );

 filtrados.forEach(nombre =>{

  let div = document.createElement("div");
  div.innerText = nombre;
  div.className = "item-autocomplete";

  div.onclick = function(){
   document.getElementById("nombre").value = nombre;
   lista.innerHTML = "";
   autocompletar();
  };

  lista.appendChild(div);

 });

}
function filtrarHallazgos(){

 let input = document.getElementById("hallazgo").value.toUpperCase();
 let lista = document.getElementById("listaHallazgosCustom");

 lista.innerHTML = "";

 if(!input){

function pdf(){

 try{

 if(!formularioCompleto()){
 alert("Debes completar todos los campos antes de generar PDF");
 return;
}

 const { jsPDF } = window.jspdf;
 const doc = new jsPDF();

 let totalPages = 2;

 function footer(page){
  doc.setFontSize(10);
  doc.setTextColor(120);
  doc.text("SISTEMA DE GESTION DE CALIDAD DHL FY2627",105,290,null,null,"center");
  doc.text(folioGlobal + "  |  " + page + "/" + totalPages,200,290,null,null,"right");
 }

 function header(){
  doc.setFillColor(213,5,17);
  doc.rect(0,0,210,22,"F");

  doc.setFont("helvetica","bold");
  doc.setFontSize(18);
  doc.setTextColor(255);
  doc.text("REPORTE ALERTA DE CALIDAD",105,14,null,null,"center");
 }

 const firmaY = 230;

 function dibujarFirma(){

  doc.setFont("helvetica","bold");
  doc.setFontSize(12);
  doc.setTextColor(0);

  doc.text("FIRMA: " + (datosGenerales.nombre || "-"),105,firmaY,null,null,"center");

  doc.rect(60,firmaY+5,90,40);

  try{
   doc.addImage(canvas.toDataURL(),"PNG",62,firmaY+7,86,34);
  }catch(e){
   doc.text("Sin firma",105,firmaY+25,null,null,"center");
  }

 }

 // ===== PAGINA 1 =====
 header();

 let y = 35;

 function fila(label, valor){

  doc.setDrawColor(200);
  doc.line(10,y,200,y);

  doc.setFont("helvetica","bold");
  doc.setFontSize(11);
  doc.setTextColor(60);
  doc.text(label,10,y+6);

  doc.setFillColor(255,230,120);
  doc.rect(95,y+1,105,11,"F");

  doc.setFont("helvetica","normal");
  doc.setTextColor(0);
  doc.text((valor || "-").toString(),198,y+8,null,null,"right");

  y += 12;
 }

 fila("FOLIO",folioGlobal);
 fila("Fecha",datosGenerales.fecha);
 fila("Elaborado por",datosGenerales.nombre);
 fila("Turno",datosGenerales.turno);
 fila("Cuadrilla",datosGenerales.cuadrilla);

 fila("Ubicación",ubicacion.value);
 fila("Área",datosGenerales.area);
 fila("Modo de falla",hallazgo.value);

 fila("Código",codigo.value);
 fila("Lote",lote.value);
 fila("Cantidad",cantidad.value);

 dibujarFirma();
 footer(1);

 // ===== PAGINA 2 =====
 doc.addPage();
 header();

 doc.setFont("helvetica","bold");
 doc.setFontSize(14);
 doc.setTextColor(0);
 doc.text("EVIDENCIA FOTOGRÁFICA",10,30);

 let x = 10;
 let yImg = 40;

 if(foto.files.length > 0){

  let readers = [];
  let imgs = [];

  for(let i=0;i<foto.files.length;i++){
   readers.push(
    new Promise(resolve=>{
     let r = new FileReader();
     r.onload = e=>{
      imgs.push(e.target.result);
      resolve();
     };
     r.readAsDataURL(foto.files[i]);
    })
   );
  }

  Promise.all(readers).then(()=>{

   imgs.forEach(img=>{

    doc.rect(x,yImg,90,70);
    doc.addImage(img,"JPEG",x+2,yImg+2,86,66);

    x += 100;

    if(x > 110){
     x = 10;
     yImg += 80;
    }

   });

   dibujarFirma();
   footer(2);

   doc.save(folioGlobal + ".pdf");

  });

 } else {

  doc.setFontSize(11);
  doc.text("Sin evidencia",10,60);

  dibujarFirma();
  footer(2);

  doc.save(folioGlobal + ".pdf");
 }

 }catch(e){
  console.error("ERROR PDF:", e);
  alert("Error al generar PDF");
 }

}

async function exportarExcel(){

 if(!formularioCompleto()){
  alert("Completa el formulario antes de exportar");
  return;
 }

 const fechaHoy = fechaFormato();

 const { data, error } = await supabaseClient
  .from("Reportes")
  .select("*")
  .eq("fecha", fechaHoy)
  .order("id", { ascending: false });

 if(error){
  alert("Error al obtener datos");
  console.error(error);
  return;
 }

 if(!data || data.length === 0){
  alert("No hay reportes del día");
  return;
 }

 let csv = "REPORTE ALERTA DE CALIDAD\n\n";
csv += "Folio,Fecha,Nombre,Turno,Cuadrilla,Area,Tipo,Hallazgo,Ubicacion,Codigo,Lote,Cantidad,Unidad\n";

 data.forEach(r => {
  csv += `${r.folio},${r.fecha},${r.nombre},${r.turno},${r.cuadrilla},${r.area},${r.tipo},${r.hallazgo},${r.ubicacion},${r.codigo || "N/A"},${r.lote || "N/A"},${r.cantidad || "N/A"},${r.unidad || "N/A"}\n`;
 });

 let blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
 let url = URL.createObjectURL(blob);

 let a = document.createElement("a");
 a.href = url;
 a.download = "Reportes_" + fechaHoy + ".csv";
 a.click();

}

async function cargarAdmin(){

 let hallazgo = document.getElementById("adminHallazgo").value.toUpperCase();
 let fechaInicio = document.getElementById("fechaInicio").value;
 let fechaFin = document.getElementById("fechaFin").value;

 const { data, error } = await supabaseClient
  .from("Reportes")
  .select("*")
  .order("id", { ascending: false });

 if(error){
  alert("Error cargando datos");
  console.error(error);
  return;
 }

 let tabla = document.getElementById("adminTabla");
 tabla.innerHTML = "";

 data.forEach(r => {

  let pasa = true;

  // filtro hallazgo
  if(hallazgo && r.hallazgo !== hallazgo){
    pasa = false;
  }

  // filtro fechas
  if(fechaInicio && fechaFin){

 let fechaReporte = convertirFecha(r.fecha);

 if(fechaReporte < fechaInicio || fechaReporte > fechaFin){
   pasa = false;
 }

}

  if(!pasa) return;

  let fila = document.createElement("tr");

 fila.innerHTML = `
  <td>${r.folio}</td>
  <td>${r.fecha}</td>
  <td>${r.nombre}</td>
  <td>${r.turno}</td>
  <td>${r.tipo}</td>
  <td>${r.hallazgo}</td>
  <td>
    <button onclick='generarPDFdesdeAdmin(${JSON.stringify(r)})'>
      PDF
    </button>
  </td>

  `;

  tabla.appendChild(fila);

 });

}

function convertirFecha(fechaTexto){

 const meses = {
  ene:"01", feb:"02", mar:"03", abr:"04", may:"05", jun:"06",
  jul:"07", ago:"08", sep:"09", oct:"10", nov:"11", dic:"12"
 };

 let partes = fechaTexto.split("-");
 let dia = partes[0];
 let mesTexto = partes[1];
 let anio = "20" + partes[2];
 let mes = meses[mesTexto];

 return `${anio}-${mes}-${dia}`;
}

async function generarPDFdesdeAdmin(r){

 try{

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let totalPages = 2;

  function footer(page){
    doc.setFontSize(10);
    doc.setTextColor(120);
    doc.text("SISTEMA DE GESTION DE CALIDAD DHL FY2627",105,290,null,null,"center");
    doc.text(r.folio + "  |  " + page + "/" + totalPages,200,290,null,null,"right");
  }

  function header(){
    doc.setFillColor(213,5,17);
    doc.rect(0,0,210,22,"F");

    doc.setFont("helvetica","bold");
    doc.setFontSize(18);
    doc.setTextColor(255);
    doc.text("REPORTE ALERTA DE CALIDAD",105,14,null,null,"center");
  }

  const firmaY = 230;

  function dibujarFirma(){

    doc.setFont("helvetica","bold");
    doc.setFontSize(12);
    doc.setTextColor(0);

    doc.text("FIRMA: " + (r.nombre || "-"),105,firmaY,null,null,"center");

    doc.rect(60,firmaY+5,90,40);

    if(r.firma){
      doc.addImage(r.firma,"PNG",62,firmaY+7,86,34);
    }

  }

  // PAGINA 1
  header();

  let y = 35;

  function fila(label, valor){

    doc.setDrawColor(200);
    doc.line(10,y,200,y);

    doc.setFont("helvetica","bold");
    doc.setFontSize(11);
    doc.setTextColor(60);
    doc.text(label,10,y+6);

    doc.setFillColor(255,230,120);
    doc.rect(95,y+1,105,11,"F");

    doc.setFont("helvetica","normal");
    doc.setTextColor(0);
    doc.text((valor || "-").toString(),198,y+8,null,null,"right");

    y += 12;
  }

  fila("FOLIO", r.folio);
  fila("Fecha", r.fecha);
  fila("Elaborado por", r.nombre);
  fila("Turno", r.turno);
  fila("Cuadrilla", r.cuadrilla);
  fila("Ubicación", r.ubicacion);
  fila("Área", r.area);
  fila("Modo de falla", r.hallazgo);
  fila("Código", r.codigo);
  fila("Lote", r.lote);
  fila("Cantidad", r.cantidad);

  dibujarFirma();
  footer(1);

  // PAGINA 2
  doc.addPage();
  header();

  doc.setFont("helvetica","bold");
  doc.setFontSize(14);
  doc.text("EVIDENCIA FOTOGRÁFICA",10,30);

  let x = 10;
  let yImg = 40;

  if(r.imagenes && r.imagenes.length > 0){

    for(let i = 0; i < r.imagenes.length; i++){

      let img = await fetch(r.imagenes[i]).then(res => res.blob());
      let reader = new FileReader();

      await new Promise(resolve=>{
        reader.onload = function(){
          doc.addImage(reader.result,"JPEG",x+2,yImg+2,86,66);
          resolve();
        };
        reader.readAsDataURL(img);
      });

      doc.rect(x,yImg,90,70);

      x += 100;

      if(x > 110){
        x = 10;
        yImg += 80;
      }

    }

  } else {
    doc.text("Sin evidencia",10,60);
  }

  dibujarFirma();
  footer(2);

  doc.save(r.folio + ".pdf");

 }catch(e){
  console.error(e);
  alert("Error generando PDF");
 }

}
