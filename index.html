<!DOCTYPE html>
<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{ box-sizing:border-box; }

body{
 margin:0;
 font-family:Arial;
 background:url('glo-dgf-zoom-wallpaper3-1920x1080.jpg') no-repeat center;
 background-size:cover;
 display:flex;
 justify-content:center;
 align-items:flex-start;
 min-height:100vh;
 padding:15px;
}

.card{
 background:rgba(255,230,128,0.95);
 padding:25px;
 max-width:420px;
 width:100%;
 border-radius:15px;
 border:2px solid #d40511;
 box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.hidden{display:none;}

.btn-gris{
 background:#6c757d;
 color:white;
}

.btn-gris:hover{
 background:#5a6268;
 transform:scale(1.03);
}

.botones-row{
 display:flex;
 gap:10px;
 margin-top:15px;
}

.btn-app{
 flex:1;
 padding:12px;
 border:none;
 border-radius:20px;
 font-weight:bold;
 font-size:14px;
 cursor:pointer;
 transition:0.2s;
 box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.btn-verde{
 background:#2e7d32;
 color:white;
}

.btn-verde:hover{
 background:#256628;
 transform:scale(1.03);
}

.btn-rojo{
 background:#d40511;
 color:white;
}

.btn-rojo:hover{
 background:#a6030c;
 transform:scale(1.03);
}

.btn-admin{
 background:#6f42c1;
 color:white;
}

.btn-admin:hover{
 background:#5935a3;
 transform:scale(1.03);
}

.btn-app:active{
 transform:scale(0.97);
}

h2{text-align:center;color:#d40511;}

label{margin-top:6px;font-size:12px;font-weight:bold;}

input,select{
 width:100%;
 padding:10px;
 margin-top:4px;
 border-radius:8px;
 border:1px solid #bbb;
}

button{
 width:100%;
 padding:12px;
 margin-top:10px;
 background:#d40511;
 color:white;
 border:none;
 border-radius:8px;
 cursor:pointer;
}

.section{
 background:#ffffff40;
 margin-top:10px;
 padding:10px;
 border-radius:8px;
}

.folio{
 text-align:center;
 font-weight:bold;
 background:#eee;
 padding:8px;
 border-radius:8px;
 margin-bottom:10px;
}

canvas{
 width:100%;
 height:120px;
 border:1px solid black;
 background:white;
}
</style>
</head>

<body>

<div class="card" id="loginBox">
<h2>REPORTE ALERTA DE CALIDAD</h2>

<label>Nombre</label>
<input list="listaNombres" id="nombre" placeholder="Escribe el nombre" onchange="autocompletar()">

<datalist id="listaNombres">
<option value="Angel Moreno">
<option value="Antonio Badillo">
<option value="Areli Rosas">
<option value="Ivan Coxanteje">
<option value="Gregorio Pérez">
<option value="Jesús Gonzalez">
<option value="Gabriela Alvarado">
<option value="Carlos Cruz">
<option value="Felix Montoya">
</datalist>

<label>Password</label>
<input id="password" type="password" placeholder="Ingresa tu contraseña">

<label>Cuadrilla</label>
<input id="cuadrilla" readonly>

<label>Área</label>
<input id="areaLogin" readonly>

<label>Turno</label>
<select id="turno">
<option>Matutino</option>
<option>Nocturno</option>
</select>

<label>Fecha</label>
<input id="fechaLogin" readonly>

<button onclick="login()">Entrar</button>
</div>

<div class="card hidden" id="systemBox">
<h2>
REPORTE ALERTA DE CALIDAD<br>
<span id="bienvenida" style="font-size:14px;color:#333;"></span>
</h2>

<div id="folioBox" class="folio">Folio: ---</div>

<div class="section">
<label>Tipo</label>
<select id="tipo" onchange="cambiarTipo()">
<option value="">Selecciona</option>
<option>Producto</option>
<option>Transporte</option>
<option>Infraestructura</option>
</select>

<div id="productoSec" class="hidden">
<label>Código</label>
<input id="codigo">
<label>Lote</label>
<input id="lote">
<label>Cantidad</label>
<input id="cantidad" type="number">
<label>Unidad</label>
<select id="unidad">
<option value="">Selecciona</option>
<option>Item</option>
<option>Caja</option>
<option>Pallet</option>
</select>
</div>

<div id="transporteSec" class="hidden">
<label>Unidad envío</label>
<input id="unidadEnvio">
<label>Identificador</label>
<input id="idTransporte">
</div>

<label>Hallazgo</label>

<input list="listaHallazgos" id="hallazgo" placeholder="Escribe el hallazgo" onchange="validarHallazgo()">

<datalist id="listaHallazgos">
<option value="CAJAS ABIERTAS">
<option value="CAJAS DAÑADAS">
<option value="CAVERNA">
<option value="CODIGO ERRONEO">
<option value="COLAPSO">
<option value="CORTINA DAÑADA">
<option value="DERRAME DE PRODUCTO">
<option value="DESVIACIÓN">
<option value="DIMENSIÓN INADECUADA">
<option value="ENVOLTURAS (DULCES)">
<option value="ETIQUETA DAÑADA">
<option value="ETIQUETA DESPRENDIDA">
<option value="ETIQUETA SIN INFORMACIÓN">
<option value="FALTANTE">
<option value="GOTERA">
<option value="MAL EMPLAYADO">
<option value="MEZCLA DE CÓDIGOS">
<option value="MEZCLA DE LOTES">
<option value="MURO">
<option value="ORDEN Y LIMPIEZA">
<option value="ORIENTACIÓN INCORRECTA">
<option value="PALLET CON POLVO">
<option value="PALLET CON RESTO">
<option value="PALLET LADEADO">
<option value="PALLET SIN ETIQUETA">
<option value="PALLET SOBRE PASILLO">
<option value="PALLET VACÍO EN UBICACIÓN">
<option value="PIRAMIDE DE FRAGILIDAD">
<option value="PLAGA">
<option value='PRODUCTO "SUELTO"'>
<option value="PRODUCTO MOJADO">
<option value="RACK DAÑADO">
<option value="REGLETA DAÑADA">
<option value="REGLETA NO LEGIBLE">
<option value="SECTORIZACIÓN INCORRECTA">
<option value="SOBRANTE">
<option value="SUSTRACCION">
<option value="TARIMA DAÑADA">
</datalist>

<label>Ubicación</label>
<input id="ubicacion" placeholder="Ingresa la ubicación">
</div>

<div class="section">
<label>Evidencia fotográfica</label>

<input type="file" id="foto" accept="image/*" multiple>

</div>

<div class="section">
<label>Firma</label>
<canvas id="firma"></canvas>
<button class="btn-app btn-gris" onclick="limpiarFirma()">Limpiar Firma</button>
</div>

<div class="botones-row">
<button class="btn-verde" onclick="guardar()">Guardar</button>
<button class="btn-verde" onclick="pdf()">PDF</button>
</div>
<button id="adminBtn" class="hidden" onclick="accionAdmin()">Panel Admin</button>
<button class="btn-app btn-rojo" onclick="logout()">Cerrar sesión</button>

<p id="msg"></p>
</div>

<script>

// SUPABASE
const supabaseClient = supabase.createClient(
 "https://wpitemofrqzjcsetmmim.supabase.co",
 "sb_publishable_lHlAJ8Q2lThBAd9oDy69cw_QkSTlJLu"
);

// FECHA
function fechaFormato(){
 const m=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
 let d=new Date();
 return `${String(d.getDate()).padStart(2,'0')}-${m[d.getMonth()]}-${String(d.getFullYear()).slice(-2)}`;
}
fechaLogin.value=fechaFormato();

// PERSONAL
const personal = {

 "Angel Moreno": {cuadrilla:"A", area:"Embarque", pass:"1234"},
 "Antonio Badillo": {cuadrilla:"A", area:"Recibo", pass:"1234"},

 "Areli Rosas": {cuadrilla:"B", area:"Embarque", pass:"1234"},
 "Ivan Coxanteje": {cuadrilla:"B", area:"Recibo", pass:"1234"},

 "Gregorio Pérez": {cuadrilla:"C", area:"Recibo", pass:"1234"},
 "Jesús Gonzalez": {cuadrilla:"C", area:"Embarque", pass:"1234"},

 "Gabriela Alvarado": {cuadrilla:"D", area:"Recibo", pass:"1234"},
 "Carlos Cruz": {cuadrilla:"D", area:"Embarque", pass:"1234"},

 "Felix Montoya": {
  cuadrilla: "ADMIN",
  area: "QA",
  pass: "1710",
  admin: true
 }

};


function autocompletar(){
 let p=personal[nombre.value];
 cuadrilla.value=p?.cuadrilla || "";
 areaLogin.value=p?.area || "";
}

function validarHallazgo(){

 let valor = hallazgo.value.trim();
 let opciones = document.getElementById("listaHallazgos").options;

 let valido = false;

 for(let i=0; i<opciones.length; i++){
  if(opciones[i].value === valor){
   valido = true;
   break;
  }
 }

 if(!valido){
  alert("Selecciona un hallazgo válido de la lista");
  hallazgo.value = "";
 }

}


let datosGenerales={},folioGlobal="";

// FOLIO
async function generarFolio(){
 const { data } = await supabaseClient
 .from("Reportes")
 .select("folio")
 .order("folio",{ascending:false})
 .limit(1);

 let ultimo=data?.[0]?.folio || "AC-2627-000";
 let num=parseInt(ultimo.split("-")[2])+1;
 return "AC-2627-"+String(num).padStart(3,'0');
}

// LOGIN
async function login(){

 if(!nombre.value){
  alert("Selecciona nombre");
  return;
 }

 if(!password.value){
  alert("Ingresa la contraseña");
  return;
 }

 let user = personal[nombre.value];

if(!user){
 alert("Usuario inválido");
 return;
}

let esAdmin = user.admin === true;


 if(password.value.trim() !== user.pass){
  alert("Contraseña incorrecta");
  return;
 }

 // ✅ si pasa todo
 datosGenerales={
  nombre:nombre.value,
  cuadrilla:user.cuadrilla,
  area:user.area,
  turno:turno.value,
  fecha:fechaLogin.value
 };

 cuadrilla.value = user.cuadrilla;
 areaLogin.value = user.area;

 folioGlobal=await generarFolio();
 folioBox.innerText="Folio: "+folioGlobal;

 bienvenida.innerText = "BIENVENIDO: " + datosGenerales.nombre.toUpperCase();

 loginBox.classList.add("hidden");
 systemBox.classList.remove("hidden");
 // ✅ guardar sesión con expiración (30 min)
let tiempoExp = new Date().getTime() + (30 * 60 * 1000);
localStorage.setItem("sesionActiva", "true");
localStorage.setItem("expiraEn", tiempoExp.toString());
localStorage.setItem("usuarioNombre", nombre.value);
localStorage.setItem("usuarioTurno", turno.value);
localStorage.setItem("usuarioFecha", fechaLogin.value);
 if(esAdmin){
 adminBtn.classList.remove("hidden");
}
}

// TIPO
function cambiarTipo(){
 productoSec.classList.add("hidden");
 transporteSec.classList.add("hidden");

 if(tipo.value==="Producto") productoSec.classList.remove("hidden");
 if(tipo.value==="Transporte") transporteSec.classList.remove("hidden");
}

// FIRMA
let canvas=document.getElementById("firma");
let ctx=canvas.getContext("2d");

canvas.width=300;height=120;

let d = false;

// MOUSE (PC)
canvas.addEventListener("mousedown", ()=> d = true);
canvas.addEventListener("mouseup", ()=> { d = false; ctx.beginPath(); });
canvas.addEventListener("mousemove", e=>{
 if(!d) return;
 ctx.lineTo(e.offsetX, e.offsetY);
 ctx.stroke();
});

// TOUCH (CELULAR)
canvas.addEventListener("touchstart", e=>{
 d = true;
 const rect = canvas.getBoundingClientRect();
 const touch = e.touches[0];
 ctx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top);
});

canvas.addEventListener("touchend", ()=>{
 d = false;
 ctx.beginPath();
});

canvas.addEventListener("touchmove", e=>{
 if(!d) return;
 e.preventDefault();

 const rect = canvas.getBoundingClientRect();
 const touch = e.touches[0];

 ctx.lineTo(
  touch.clientX - rect.left,
  touch.clientY - rect.top
 );
 ctx.stroke();
});

function limpiarFirma(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
}

function accionAdmin(){
 alert("Bienvenido al panel de administrador");
}


// GUARDAR
async function guardar(){

 // ✅ VALIDACIÓN COMPLETA
 if(
  !folioGlobal ||
  !datosGenerales ||
  !datosGenerales.nombre ||
  !datosGenerales.turno ||
  !datosGenerales.cuadrilla ||
  !datosGenerales.area ||
  !tipo.value ||
  !hallazgo.value ||
  !ubicacion.value ||

  // validaciones específicas por tipo
  (tipo.value === "Producto" && (
    !codigo.value ||
    !lote.value ||
    !cantidad.value ||
    !unidad.value
  )) ||

  (tipo.value === "Transporte" && (
    !unidadEnvio.value ||
    !idTransporte.value
  )) ||

  // firma obligatoria
  canvas.toDataURL() === "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAASwAAABYCAIAAACs7Y8XAAAAA3NCSVQICAjb4U/gAAACMElEQVR4nO3SwQ3CMBBF0ff/p1sJ2AkZISwLgSKKnz4WxZmfZbduAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAPyW9bZo4H8H2k+X6AfdbDDIYRhGMZRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAPgFfwFjLaVaP5I8kwAAAABJRU5ErkJggg=="
 ){
  alert("Debes completar todos los campos y firmar antes de guardar");
  return;
 }

 msg.innerText="✅ Guardado "+folioGlobal;

}

// PDF COMPLETO ORIGINAL
function pdf(){

 try{

 if(
  !folioGlobal ||
  !datosGenerales ||
  !datosGenerales.nombre ||
  !datosGenerales.turno ||
  !datosGenerales.cuadrilla ||
  !datosGenerales.area ||
  !tipo.value ||
  !hallazgo.value ||
  !ubicacion.value
 ){
  alert("Debes llenar todos los datos antes de generar el PDF");
  return;
 }

 const { jsPDF } = window.jspdf;
 const doc = new jsPDF();

 let totalPages = 2;

 function footer(page){
  doc.setFontSize(10);
  doc.setTextColor(120);
  doc.text("SISTEMA DE GESTION DE CALIDAD DHL FY2627",105,290,null,null,"center");
  doc.text(folioGlobal + "  |  " + page + "/" + totalPages,200,290,null,null,"right");
 }

 function header(){
  doc.setFillColor(200,0,0);
  doc.rect(0,0,210,22,"F");

  doc.setFont("helvetica","bold");
  doc.setFontSize(18);
  doc.setTextColor(255);
  doc.text("REPORTE ALERTA DE CALIDAD",105,14,null,null,"center");
 }

 const firmaY = 230;

 function dibujarFirma(){

  // ✅ TEXTO NEGRO + DINÁMICO
  doc.setFont("helvetica","bold");
  doc.setFontSize(12);
  doc.setTextColor(0);

  doc.text("FIRMA: " + (datosGenerales.nombre || "-"),105,firmaY,null,null,"center");

  // caja centrada
  doc.rect(60,firmaY+5,90,40);

  // imagen firma
  try{
   doc.addImage(canvas.toDataURL(),"PNG",62,firmaY+7,86,34);
  }catch(e){
   doc.setTextColor(0);
   doc.text("Sin firma",105,firmaY+25,null,null,"center");
  }

 }

 // ===== PAGINA 1 =====
 header();

 let y = 35;

 function fila(label, valor){

  doc.setDrawColor(200);
  doc.line(10,y,200,y);

  doc.setFont("helvetica","bold");
  doc.setFontSize(11);
  doc.setTextColor(60);
  doc.text(label,10,y+6);

  doc.setFillColor(255,230,120);
  doc.rect(95,y+1,105,11,"F");

  doc.setFont("helvetica","normal");
  doc.setTextColor(0);
  doc.text((valor || "-").toString(),198,y+8,null,null,"right");

  y += 12;
 }

 fila("FOLIO",folioGlobal);
 fila("Fecha",datosGenerales.fecha);
 fila("Elaborado por",datosGenerales.nombre);
 fila("Turno",datosGenerales.turno);
 fila("Cuadrilla",datosGenerales.cuadrilla);

 fila("Ubicación",ubicacion.value);
 fila("Área",datosGenerales.area);
 fila("Modo de falla",hallazgo.value);

 fila("Código",(codigo && codigo.value));
 fila("Lote",(lote && lote.value));
 fila("Cantidad",(cantidad && cantidad.value));

 // ✅ FIRMA PAGINA 1
 dibujarFirma();

 footer(1);

 // ===== PAGINA 2 =====
 doc.addPage();
 header();

 doc.setFont("helvetica","bold");
 doc.setFontSize(14);
 doc.setTextColor(0);
 doc.text("EVIDENCIA FOTOGRÁFICA",10,30);

 let x = 10;
 let yImg = 40;

 if(foto && foto.files && foto.files.length > 0){

  let readers = [];
  let imgs = [];

  for(let i=0;i<foto.files.length;i++){
   readers.push(
    new Promise(function(resolve){
     let r = new FileReader();
     r.onload = function(e){
      imgs.push(e.target.result);
      resolve();
     };
     r.readAsDataURL(foto.files[i]);
    })
   );
  }

  Promise.all(readers).then(function(){

   imgs.forEach(function(img){

    doc.rect(x,yImg,90,70);
    doc.addImage(img,"JPEG",x+2,yImg+2,86,66);

    x += 100;

    if(x > 110){
     x = 10;
     yImg += 80;
    }

   });

   // ✅ FIRMA PAGINA 2 (MISMA POSICIÓN + NEGRO + TEXTO)
   dibujarFirma();

   footer(2);

   doc.save(folioGlobal + ".pdf");

  });

 } else {

  doc.setFontSize(11);
  doc.text("Sin evidencia",10,60);

  dibujarFirma();

  footer(2);

  doc.save(folioGlobal + ".pdf");
 }

 }catch(e){
 console.error("ERROR PDF:", e);
 alert("Error al generar PDF");
 }

}
window.onload = function(){

 let sesion = localStorage.getItem("sesionActiva");
 let expiraEn = localStorage.getItem("expiraEn");

 if(sesion === "true" && expiraEn){

  let ahora = new Date().getTime();

  if(ahora < parseInt(expiraEn)){

 loginBox.classList.add("hidden");
 systemBox.classList.remove("hidden");

 // ✅ restaurar usuario
 let nombreGuardado = localStorage.getItem("usuarioNombre");

 if(nombreGuardado){

 let user = personal[nombreGuardado];

 let turnoGuardado = localStorage.getItem("usuarioTurno");
 let fechaGuardado = localStorage.getItem("usuarioFecha");

 datosGenerales = {
  nombre: nombreGuardado,
  cuadrilla: user.cuadrilla,
  area: user.area,
  turno: turnoGuardado,
  fecha: fechaGuardado
 };

 bienvenida.innerText = "BIENVENIDO: " + nombreGuardado.toUpperCase();

 cuadrilla.value = user.cuadrilla;
 areaLogin.value = user.area;
 turno.value = turnoGuardado;
 fechaLogin.value = fechaGuardado;

 // ✅ GENERAR FOLIO correctamente
 (async function(){
  let folio = await generarFolio();
  folioGlobal = folio;
  folioBox.innerText = "Folio: " + folioGlobal;
 })();

 if(user && user.admin){
  adminBtn.classList.remove("hidden");
 }

}


}
  }else{
   // ❌ sesión expirada
   localStorage.removeItem("sesionActiva");
   localStorage.removeItem("expiraEn");
  }

 }
function logout(){

 // borrar sesión completa
 localStorage.removeItem("sesionActiva");
 localStorage.removeItem("expiraEn");
 localStorage.removeItem("usuarioNombre");
 localStorage.removeItem("usuarioTurno");
 localStorage.removeItem("usuarioFecha");

 // regresar a login
 location.reload();

}
</script>
</body>
</html>
