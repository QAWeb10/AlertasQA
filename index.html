<!DOCTYPE html>
<html lang="es">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- ✅ LIBRERÍAS BIEN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
  font-family: Arial;
  background:#ffcc00;
  margin:0;
}
.card{
  background:white;
  padding:25px;
  margin:auto;
  margin-top:40px;
  width:90%;
  max-width:500px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}
h2{
  text-align:center;
  color:#d40511;
}
input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc;
}
button{
  width:100%;
  padding:12px;
  background:#d40511;
  color:white;
  border:none;
  border-radius:8px;
  margin-top:10px;
  font-weight:bold;
}
canvas{
  border:1px solid #ccc;
}
.hidden{display:none;}
.msg{color:green;text-align:center;}
</style>

</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginBox">
  <h2>Login QA DHL</h2>
  <input id="user" placeholder="Usuario">
  <input id="pass" type="password" placeholder="Contraseña">
  <button onclick="login()">Entrar</button>
</div>

<!-- FORM -->
<div class="card hidden" id="formBox">
<h2>Reporte Calidad</h2>

<form id="form">

<input type="date" id="fecha" required>

<select id="elaborado">
<option>Analista1</option>
<option>Analista2</option>

</select>

<select id="turno">
<option>Matutino</option>
<option>Nocturno</option>
</select>

<input id="ubicacion" placeholder="Ubicación">

<select id="area">
<option>Recibo</option>
<option>Embarque</option>
</select>

<select id="hallazgo">
<option>Error</option>
<option>Daño</option>
</select>

<input type="number" id="codigo" placeholder="Código">

<label>Foto</label>
<input type="file" id="foto">

<label>Firma</label>
<canvas id="canvas" width="300" height="150"></canvas>
<button type="button" onclick="limpiar()">Limpiar firma</button>

<button type="submit">Guardar Reporte</button>

</form>

<p id="mensaje" class="msg"></p>

<button id="btnPDF" onclick="descargarPDF()" class="hidden">
Descargar PDF
</button>

</div>

<script>

// ✅ CONEXIÓN CORRECTA
const supabaseClient = supabase.createClient(
 "https://wpitemofrqzjcsetmmim.supabase.co",
 "sb_publishable_lHlAJ8Q2lThBAd9oDy69cw_QkSTlJLu"
);

// ✅ LOGIN
function login(){
 let u=document.getElementById("user").value;
 let p=document.getElementById("pass").value;

 if((u=="admin" && p=="1234") || (u=="analista1" && p=="1111")){
   document.getElementById("loginBox").classList.add("hidden");
   document.getElementById("formBox").classList.remove("hidden");
 }else{
   alert("Usuario incorrecto");
 }
}

// ✅ FIRMA
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");
let dibujando=false;

canvas.onmousedown=()=>dibujando=true;
canvas.onmouseup=()=>dibujando=false;
canvas.onmousemove=e=>{
 if(!dibujando)return;
 ctx.lineTo(e.offsetX,e.offsetY);
 ctx.stroke();
};

function limpiar(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
}

// ✅ BASE64
function toBase64(file){
 return new Promise(res=>{
  let r=new FileReader();
  r.onload=()=>res(r.result);
  r.readAsDataURL(file);
 });
}

// ✅ VARIABLES
let ultimoRegistro=null;
let ultimaFoto=null;
let ultimaFirma=null;

// ✅ ENVÍO
document.getElementById("form").addEventListener("submit", async e=>{
 e.preventDefault();

 try{

 let fotoFile=foto.files[0];
 let fotoBase64="";
 if(fotoFile) fotoBase64=await toBase64(fotoFile);

 let firma=canvas.toDataURL();
let data = {
  fecha: fecha.value,
  elaborado: elaborado.value,
  turno: turno.value,
  ubicacion: ubicacion.value || null,
  area: area.value,
  hallazgo: hallazgo.value,
  codigo: codigo.value ? parseInt(codigo.value) : null
};

const { data: result, error } = await supabaseClient
  .from("Reportes")
  .insert([data])
  .select();

if (error) {
  console.error("ERROR SUPABASE:", error);
  alert("Error: " + error.message);
  return;
}

 ultimoRegistro={...data, folio:result[0].id};
 ultimaFoto=fotoBase64;
 ultimaFirma=firma;

 mensaje.innerText="✅ Registro guardado correctamente";
 btnPDF.classList.remove("hidden");

 }catch(err){
  console.log(err);
  alert("Error general");
 }

});

// ✅ PDF
function descargarPDF(){
 const {jsPDF}=window.jspdf;
 let doc=new jsPDF();

 doc.text("REPORTE DE CALIDAD DHL",20,20);
 doc.text("FOLIO: FOL-"+ultimoRegistro.folio,20,30);

 let y=40;

 for(let k in ultimoRegistro){
  if(k!="folio"){
   doc.text(k+": "+ultimoRegistro[k],20,y);
   y+=10;
  }
 }

 if(ultimaFoto){
  doc.addImage(ultimaFoto,"JPEG",20,y,60,60);
  y+=70;
 }

 doc.text("Firma:",20,y);
 doc.addImage(ultimaFirma,"PNG",20,y+10,60,30);

 doc.save("FOL-"+ultimoRegistro.folio+".pdf");
}

</script>

</body>
</html>
``
