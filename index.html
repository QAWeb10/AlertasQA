<script>

// SUPABASE
const supabaseClient = supabase.createClient(
 "https://wpitemofrqzjcsetmmim.supabase.co",
 "sb_publishable_lHlAJ8Q2lThBAd9oDy69cw_QkSTlJLu"
);

// FECHA
function fechaFormato(){
 const m=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
 let d=new Date();
 return `${String(d.getDate()).padStart(2,'0')}-${m[d.getMonth()]}-${String(d.getFullYear()).slice(-2)}`;
}
fechaLogin.value=fechaFormato();

function cerrarFirma(){
 document.getElementById("firmaModal").classList.add("hidden");

}
// PERSONAL
const personal = {

 "Angel Moreno": {cuadrilla:"A", area:"Embarque", pass:"1234"},
 "Antonio Badillo": {cuadrilla:"A", area:"Recibo", pass:"1234"},

 "Areli Rosas": {cuadrilla:"B", area:"Embarque", pass:"1234"},
 "Ivan Coxanteje": {cuadrilla:"B", area:"Recibo", pass:"1234"},

 "Gregorio Pérez": {cuadrilla:"C", area:"Recibo", pass:"1234"},
 "Jesús Gonzalez": {cuadrilla:"C", area:"Embarque", pass:"1234"},

 "Gabriela Alvarado": {cuadrilla:"D", area:"Recibo", pass:"1234"},
 "Carlos Cruz": {cuadrilla:"D", area:"Embarque", pass:"1234"},

 "Felix Montoya": {
  cuadrilla: "ADMIN",
  area: "QA",
  pass: "1710",
  admin: true
 }

};


function autocompletar(){
 let p=personal[nombre.value];
 cuadrilla.value=p?.cuadrilla || "";
 areaLogin.value=p?.area || "";
}

function validarHallazgo(){

 let valor = hallazgo.value.trim().toUpperCase();
 let opciones = document.getElementById("listaHallazgos").options;

 let valido = false;

 for(let i=0; i < opciones.length; i++){
  if(opciones[i].value === valor){
   valido = true;
   break;
  }
 }

 if(!valido){
  alert("Selecciona un hallazgo válido de la lista");
  hallazgo.value = "";
 } else {
  // ✅ fuerza formato correcto
  hallazgo.value = valor;
 }
}

let datosGenerales={},folioGlobal="";

// FOLIO
async function generarFolio(){
 const { data } = await supabaseClient
 .from("Reportes")
 .select("folio")
 .order("folio",{ascending:false})
 .limit(1);

 let ultimo=data?.[0]?.folio || "AC-2627-000";
 let num=parseInt(ultimo.split("-")[2])+1;
 return "AC-2627-"+String(num).padStart(3,'0');
}

// LOGIN
async function login(){

 if(!nombre.value){
  alert("Selecciona nombre");
  return;
 }

 if(!password.value){
  alert("Ingresa la contraseña");
  return;
 }

let nombreLimpio = nombre.value.trim();
let user = personal[nombreLimpio];

if(!user){
 alert("Usuario inválido");
 return;
}

let esAdmin = user.admin === true;


 if(password.value.trim() !== user.pass){
  alert("Contraseña incorrecta");
  return;
 }

 // ✅ si pasa todo
datosGenerales={
  nombre:nombreLimpio,
  cuadrilla:user.cuadrilla,
  area:user.area,
  turno:turno.value,
  fecha:fechaLogin.value
 };

 cuadrilla.value = user.cuadrilla;
 areaLogin.value = user.area;

 folioGlobal=await generarFolio();
 folioBox.innerText="Folio: "+folioGlobal;

 bienvenida.innerText = "BIENVENIDO: " + datosGenerales.nombre.toUpperCase();

 loginBox.classList.add("hidden");
 systemBox.classList.remove("hidden");
 // ✅ guardar sesión con expiración (30 min)
let tiempoExp = new Date().getTime() + (30 * 60 * 1000);
localStorage.setItem("sesionActiva", "true");
localStorage.setItem("expiraEn", tiempoExp.toString());
localStorage.setItem("usuarioNombre", nombreLimpio);
localStorage.setItem("usuarioTurno", turno.value);
localStorage.setItem("usuarioFecha", fechaLogin.value);
 if(esAdmin){
 adminBtn.classList.remove("hidden");
}
}

// TIPO
function cambiarTipo(){
 productoSec.classList.add("hidden");
 transporteSec.classList.add("hidden");

 if(tipo.value==="Producto") productoSec.classList.remove("hidden");
 if(tipo.value==="Transporte") transporteSec.classList.remove("hidden");
}

// FIRMA
let canvas=document.getElementById("firma");
let ctx=canvas.getContext("2d");

// ===== FIRMA GRANDE (MODAL) =====
let canvasGrande;
let ctxGrande;


function abrirFirma(){
 document.getElementById("firmaModal").classList.remove("hidden");

 setTimeout(()=>{

  canvasGrande = document.getElementById("firmaGrande");
  ctxGrande = canvasGrande.getContext("2d");

  canvasGrande.width = canvasGrande.offsetWidth;
  canvasGrande.height = 200;

  ctxGrande.strokeStyle = "black";
  ctxGrande.lineWidth = 2;

  let d2 = false;

  // mouse
  canvasGrande.onmousedown = () => d2 = true;

  canvasGrande.onmouseup = () => {
   d2 = false;
   ctxGrande.beginPath();
  };

  canvasGrande.onmousemove = e=>{
   if(!d2) return;
   ctxGrande.lineTo(e.offsetX, e.offsetY);
   ctxGrande.stroke();
  };

  // touch
  canvasGrande.ontouchstart = e=>{
   e.preventDefault();
   d2 = true;

   const rect = canvasGrande.getBoundingClientRect();
   const touch = e.touches[0];

   ctxGrande.beginPath();
   ctxGrande.moveTo(
    touch.clientX - rect.left,
    touch.clientY - rect.top
   );
  };

  canvasGrande.ontouchend = ()=>{
   d2 = false;
   ctxGrande.beginPath();
  };

  canvasGrande.ontouchmove = e=>{
   if(!d2) return;
   e.preventDefault();

   const rect = canvasGrande.getBoundingClientRect();
   const touch = e.touches[0];

   ctxGrande.lineTo(
    touch.clientX - rect.left,
    touch.clientY - rect.top
   );

   ctxGrande.stroke();
  };

 },100);
}

function limpiarFirmaGrande(){
 ctxGrande.clearRect(0,0,canvasGrande.width,canvasGrande.height);
}

function guardarFirma(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 ctx.drawImage(canvasGrande,0,0,canvas.width,canvas.height);

 document.getElementById("firmaModal").classList.add("hidden");
}
// ===== DIBUJO FIRMA GRANDE =====

let d2 = false;

// PC (mouse)
canvasGrande.addEventListener("mousedown", () => d2 = true);

canvasGrande.addEventListener("mouseup", () => { 
 d2 = false; 
 ctxGrande.beginPath(); 
});

canvasGrande.addEventListener("mousemove", e=>{
 if(!d2) return;

 ctxGrande.lineTo(e.offsetX, e.offsetY);
 ctxGrande.stroke();
});

// MÓVIL (touch)
canvasGrande.addEventListener("touchstart", e=>{
 e.preventDefault();

 d2 = true;

 const rect = canvasGrande.getBoundingClientRect();
 const touch = e.touches[0];

 ctxGrande.beginPath();
 ctxGrande.moveTo(
  touch.clientX - rect.left,
  touch.clientY - rect.top
 );
});

canvasGrande.addEventListener("touchend", ()=>{
 d2 = false;
 ctxGrande.beginPath();
});

canvasGrande.addEventListener("touchmove", e=>{
 if(!d2) return;
 e.preventDefault();

 const rect = canvasGrande.getBoundingClientRect();
 const touch = e.touches[0];

 ctxGrande.lineTo(
  touch.clientX - rect.left,
  touch.clientY - rect.top
 );

 ctxGrande.stroke();
});
ctx.strokeStyle = "black";
ctx.lineWidth = 2;

function ajustarCanvas(){
 canvas.width = canvas.offsetWidth;
 canvas.height = 150;
}

// esperar a que cargue bien
setTimeout(ajustarCanvas, 200);

let d = false;

// MOUSE (PC)
canvas.addEventListener("mousedown", ()=> d = true);
canvas.addEventListener("mouseup", ()=> { d = false; ctx.beginPath(); });
canvas.addEventListener("mousemove", e=>{
 if(!d) return;
 ctx.lineTo(e.offsetX, e.offsetY);
 ctx.stroke();
});

// TOUCH (CELULAR)
canvas.addEventListener("touchstart", e=>{
 e.preventDefault();

 d = true;
 const rect = canvas.getBoundingClientRect();
 const touch = e.touches[0];

 ctx.beginPath();
 ctx.strokeStyle = "black";
ctx.lineWidth = 2;

 ctx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top);
});

canvas.addEventListener("touchend", ()=>{
 d = false;
 ctx.beginPath();
});

canvas.addEventListener("touchmove", e=>{
 if(!d) return;
 e.preventDefault();

 const rect = canvas.getBoundingClientRect();
 const touch = e.touches[0];

 ctx.lineTo(
  touch.clientX - rect.left,
  touch.clientY - rect.top
 );
 ctx.stroke();
});

function limpiarFirma(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
}

function accionAdmin(){
 alert("Bienvenido al panel de administrador");
}


// GUARDAR
async function guardar(){

 // ✅ VALIDACIÓN COMPLETA
 if(
  !folioGlobal ||
  !datosGenerales ||
  !datosGenerales.nombre ||
  !datosGenerales.turno ||
  !datosGenerales.cuadrilla ||
  !datosGenerales.area ||
  !tipo.value ||
  !hallazgo.value ||
  !ubicacion.value ||

  // validaciones específicas por tipo
  (tipo.value === "Producto" && (
    !codigo.value ||
    !lote.value ||
    !cantidad.value ||
    !unidad.value
  )) ||

  (tipo.value === "Transporte" && (
    !unidadEnvio.value ||
    !idTransporte.value
  )) ||

  // firma obligatoria
  canvas.toDataURL() === "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAASwAAABYCAIAAACs7Y8XAAAAA3NCSVQICAjb4U/gAAACMElEQVR4nO3SwQ3CMBBF0ff/p1sJ2AkZISwLgSKKnz4WxZmfZbduAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAPyW9bZo4H8H2k+X6AfdbDDIYRhGMZRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGMYRhGAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAPgFfwFjLaVaP5I8kwAAAABJRU5ErkJggg=="
 ){
  alert("Debes completar todos los campos y firmar antes de guardar");
  return;
 }

 msg.innerText="✅ Guardado "+folioGlobal;

}

// PDF COMPLETO ORIGINAL
function pdf(){

 try{

 if(
  !folioGlobal ||
  !datosGenerales ||
  !datosGenerales.nombre ||
  !datosGenerales.turno ||
  !datosGenerales.cuadrilla ||
  !datosGenerales.area ||
  !tipo.value ||
  !hallazgo.value ||
  !ubicacion.value
 ){
  alert("Debes llenar todos los datos antes de generar el PDF");
  return;
 }

 const { jsPDF } = window.jspdf;
 const doc = new jsPDF();

 let totalPages = 2;

 function footer(page){
  doc.setFontSize(10);
  doc.setTextColor(120);
  doc.text("SISTEMA DE GESTION DE CALIDAD DHL FY2627",105,290,null,null,"center");
  doc.text(folioGlobal + "  |  " + page + "/" + totalPages,200,290,null,null,"right");
 }

 function header(){
  doc.setFillColor(200,0,0);
  doc.rect(0,0,210,22,"F");

  doc.setFont("helvetica","bold");
  doc.setFontSize(18);
  doc.setTextColor(255);
  doc.text("REPORTE ALERTA DE CALIDAD",105,14,null,null,"center");
 }

 const firmaY = 230;

 function dibujarFirma(){

  // ✅ TEXTO NEGRO + DINÁMICO
  doc.setFont("helvetica","bold");
  doc.setFontSize(12);
  doc.setTextColor(0);

  doc.text("FIRMA: " + (datosGenerales.nombre || "-"),105,firmaY,null,null,"center");

  // caja centrada
  doc.rect(60,firmaY+5,90,40);

  // imagen firma
  try{
   doc.addImage(canvas.toDataURL(),"PNG",62,firmaY+7,86,34);
  }catch(e){
   doc.setTextColor(0);
   doc.text("Sin firma",105,firmaY+25,null,null,"center");
  }

 }

 // ===== PAGINA 1 =====
 header();

 let y = 35;

 function fila(label, valor){

  doc.setDrawColor(200);
  doc.line(10,y,200,y);

  doc.setFont("helvetica","bold");
  doc.setFontSize(11);
  doc.setTextColor(60);
  doc.text(label,10,y+6);

  doc.setFillColor(255,230,120);
  doc.rect(95,y+1,105,11,"F");

  doc.setFont("helvetica","normal");
  doc.setTextColor(0);
  doc.text((valor || "-").toString(),198,y+8,null,null,"right");

  y += 12;
 }

 fila("FOLIO",folioGlobal);
 fila("Fecha",datosGenerales.fecha);
 fila("Elaborado por",datosGenerales.nombre);
 fila("Turno",datosGenerales.turno);
 fila("Cuadrilla",datosGenerales.cuadrilla);

 fila("Ubicación",ubicacion.value);
 fila("Área",datosGenerales.area);
 fila("Modo de falla",hallazgo.value);

 fila("Código",(codigo && codigo.value));
 fila("Lote",(lote && lote.value));
 fila("Cantidad",(cantidad && cantidad.value));

 // ✅ FIRMA PAGINA 1
 dibujarFirma();

 footer(1);

 // ===== PAGINA 2 =====
 doc.addPage();
 header();

 doc.setFont("helvetica","bold");
 doc.setFontSize(14);
 doc.setTextColor(0);
 doc.text("EVIDENCIA FOTOGRÁFICA",10,30);

 let x = 10;
 let yImg = 40;

 if(foto && foto.files && foto.files.length > 0){

  let readers = [];
  let imgs = [];

  for(let i=0;i<foto.files.length;i++){
   readers.push(
    new Promise(function(resolve){
     let r = new FileReader();
     r.onload = function(e){
      imgs.push(e.target.result);
      resolve();
     };
     r.readAsDataURL(foto.files[i]);
    })
   );
  }

  Promise.all(readers).then(function(){

   imgs.forEach(function(img){

    doc.rect(x,yImg,90,70);
    doc.addImage(img,"JPEG",x+2,yImg+2,86,66);

    x += 100;

    if(x > 110){
     x = 10;
     yImg += 80;
    }

   });

   // ✅ FIRMA PAGINA 2 (MISMA POSICIÓN + NEGRO + TEXTO)
   dibujarFirma();

   footer(2);

   doc.save(folioGlobal + ".pdf");

  });

 } else {

  doc.setFontSize(11);
  doc.text("Sin evidencia",10,60);

  dibujarFirma();

  footer(2);

  doc.save(folioGlobal + ".pdf");
 }

 }catch(e){
 console.error("ERROR PDF:", e);
 alert("Error al generar PDF");
 }

}

   if(nombreGuardado){

    let fechaGuardada = localStorage.getItem("usuarioFecha");

    datosGenerales = {
     nombre: nombreGuardado,

     area: user.area,
     turno: turnoGuardado,
     fecha: fechaGuardada
    };

    // texto de bienvenida
    document.getElementById("bienvenida").innerText =
     "BIENVENIDO: " + nombreGuardado.toUpperCase();

    // restaurar campos
    document.getElementById("cuadrilla").value = user.cuadrilla;
    document.getElementById("areaLogin").value = user.area;
    document.getElementById("turno").value = turnoGuardado;
    document.getElementById("fechaLogin").value = fechaGuardada;

    // generar folio nuevo
    (async function(){
     let folio = await generarFolio();
     folioGlobal = folio;
     document.getElementById("folioBox").innerText = "Folio: " + folioGlobal;
    })();

    // admin
    if(user && user.admin){
     document.getElementById("adminBtn").classList.remove("hidden");
    }

   }

  } else {

   // sesión expirada
   localStorage.removeItem("sesionActiva");
   localStorage.removeItem("expiraEn");

  }

}
};

  if(lista){
   lista.innerHTML = "";
  }
 }

});
function filtrarNombres(){

 let input = document.getElementById("nombre").value.toLowerCase();
 let lista = document.getElementById("listaResultados");

 lista.innerHTML = "";

 if(!input){
 lista.innerHTML = "";
 return;
}

 let nombres = Object.keys(personal);

 let filtrados = nombres.filter(nombre =>
  nombre.toLowerCase().includes(input)
 );

 filtrados.forEach(nombre =>{

  let div = document.createElement("div");
  div.innerText = nombre;
  div.className = "item-autocomplete";

  div.onclick = function(){
   document.getElementById("nombre").value = nombre;
   lista.innerHTML = "";
   autocompletar();
  };

  lista.appendChild(div);

 });

}

</script>
